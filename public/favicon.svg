<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>

  <!-- Gold bar chart icon — three rising bars symbolising ROI & growth -->
  <rect x="10" y="36" width="10" height="16" rx="2" fill="#f59e0b"/>
  <rect x="24" y="26" width="10" height="26" rx="2" fill="#f59e0b" opacity="0.85"/>
  <rect x="38" y="14" width="10" height="38" rx="2" fill="#f59e0b" opacity="0.7"/>

  <!-- Upward trend line connecting the bar tops -->
  <polyline
    points="15,36 29,26 43,14"
    stroke="#ffffff"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.6"
  />

  <!-- Arrow head on trend line tip -->
  <polyline
    points="37,14 43,14 43,20"
    stroke="#ffffff"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.6"
  />
</svg>
